name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx electron-vite build && npx electron-builder --mac --publish never
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: |
            release/**/*.dmg
            release/**/*.dmg.blockmap
            release/**/latest-mac.yml
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx electron-vite build && npx electron-builder --win --publish never
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installers
          # 최상위 release 폴더의 인스톨러 + 자동 업데이터 메타파일
          path: |
            release/*/1cho-capture-*-win-setup.exe
            release/*/1cho-capture-*-win-portable.exe
            release/*/1cho-capture-*-win-setup.exe.blockmap
            release/*/latest.yml
          retention-days: 30

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts
      - name: Flatten artifact paths
        # 중첩된 폴더 경로를 최상위로 평탄화 + 업데이터 메타파일 포함
        run: |
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.blockmap' -o \
            -name 'latest.yml' -o \
            -name 'latest-mac.yml' \
          \) -print
          mkdir -p flat
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.blockmap' -o \
            -name 'latest.yml' -o \
            -name 'latest-mac.yml' \
          \) -exec cp {} flat/ \;
          ls -la flat/
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: flat/*
          # 기존 release가 있으면 파일만 추가 (overwrite). body는 덮어쓰지 않게 업데이트 X
          append_body: false
          fail_on_unmatched_files: true
